<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV İzle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a4a;
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #e50914, #ff6b35);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #fff, #aaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      margin-left: auto;
      background: #e50914;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }

    .player-wrapper {
      width: 100%;
      max-width: 960px;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
      position: relative;
    }

    .player-wrapper video {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      background: #000;
    }

    .status-bar {
      width: 100%;
      max-width: 960px;
      background: #111827;
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #1e2a3a;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      box-shadow: 0 0 8px #22c55e;
    }

    .status-dot.error {
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }

    .status-dot.loading {
      background: #f59e0b;
      box-shadow: 0 0 8px #f59e0b;
      animation: pulse 1s infinite;
    }

    .status-text {
      font-size: 0.9rem;
      color: #9ca3af;
    }

    .status-text span {
      color: #e0e0e0;
      font-weight: 500;
    }

    .controls {
      width: 100%;
      max-width: 960px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #e50914, #c0040f);
      color: #fff;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #ff1a22, #e50914);
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(229,9,20,0.4);
    }

    .btn-secondary {
      background: #1e2a3a;
      color: #9ca3af;
      border: 1px solid #2a3a4a;
    }

    .btn-secondary:hover {
      background: #2a3a4a;
      color: #e0e0e0;
    }

    .url-box {
      width: 100%;
      max-width: 960px;
      background: #111827;
      border-radius: 10px;
      padding: 16px 20px;
      border: 1px solid #1e2a3a;
    }

    .url-box label {
      display: block;
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .url-input-row {
      display: flex;
      gap: 10px;
    }

    .url-input-row input {
      flex: 1;
      background: #0a0a0f;
      border: 1px solid #2a3a4a;
      border-radius: 6px;
      padding: 9px 14px;
      color: #e0e0e0;
      font-size: 0.85rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input-row input:focus {
      border-color: #e50914;
    }

    .url-input-row input::placeholder {
      color: #4b5563;
    }

    .url-input-row .btn {
      flex-shrink: 0;
    }

    .info-grid {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .info-card {
      background: #111827;
      border-radius: 10px;
      padding: 14px 18px;
      border: 1px solid #1e2a3a;
    }

    .info-card .label {
      font-size: 0.75rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .info-card .value {
      font-size: 0.95rem;
      color: #e0e0e0;
      font-weight: 600;
    }

    .error-msg {
      width: 100%;
      max-width: 960px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 14px 20px;
      color: #fca5a5;
      font-size: 0.9rem;
      display: none;
    }

    footer {
      text-align: center;
      padding: 16px;
      color: #374151;
      font-size: 0.8rem;
      border-top: 1px solid #1a1a2e;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.1rem; }
      .controls { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">▶</div>
  <h1>IPTV Canlı Yayın</h1>
  <div class="badge">● CANLI</div>
</header>

<main>

  <div class="player-wrapper">
    <video id="videoPlayer" controls autoplay muted playsinline>
      Tarayıcınız video oynatmayı desteklemiyor.
    </video>
  </div>

  <div class="status-bar">
    <div class="status-dot loading" id="statusDot"></div>
    <div class="status-text" id="statusText">Yayın yükleniyor... <span id="statusDetail">Bağlanıyor</span></div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="controls">
    <button class="btn btn-primary" onclick="loadStream()">▶ Yayını Başlat</button>
    <button class="btn btn-secondary" onclick="toggleMute()">🔊 <span id="muteLabel">Sesi Aç</span></button>
    <button class="btn btn-secondary" onclick="toggleFullscreen()">⛶ Tam Ekran</button>
    <button class="btn btn-secondary" onclick="reloadStream()">↺ Yeniden Yükle</button>
  </div>

  <div class="url-box">
    <label>Yayın URL'si (Değiştirilebilir)</label>
    <div class="url-input-row">
      <input type="text" id="streamUrlInput" value="https://d283e99f2a65ea58.vip/d283e99f2a65ea58.vip:443" placeholder="https://... yayın URL'sini girin" />
      <button class="btn btn-primary" onclick="loadCustomStream()">Yükle</button>
    </div>
  </div>

  <div class="info-grid">
    <div class="info-card">
      <div class="label">Durum</div>
      <div class="value" id="infoStatus">Yükleniyor</div>
    </div>
    <div class="info-card">
      <div class="label">Video Boyutu</div>
      <div class="value" id="infoResolution">-</div>
    </div>
    <div class="info-card">
      <div class="label">Süre</div>
      <div class="value" id="infoDuration">Canlı</div>
    </div>
    <div class="info-card">
      <div class="label">Protokol</div>
      <div class="value" id="infoProtocol">-</div>
    </div>
  </div>

</main>

<footer>
  IPTV İzleme Sitesi &mdash; Yayın kalitesi bağlantınıza bağlıdır.
</footer>

<script>
  const DEFAULT_URL = "https://d283e99f2a65ea58.vip/d283e99f2a65ea58.vip:443";

  const video = document.getElementById('videoPlayer');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const statusDetail = document.getElementById('statusDetail');
  const errorMsg = document.getElementById('errorMsg');
  const infoStatus = document.getElementById('infoStatus');
  const infoResolution = document.getElementById('infoResolution');
  const infoDuration = document.getElementById('infoDuration');
  const infoProtocol = document.getElementById('infoProtocol');

  let hlsInstance = null;
  let currentUrl = DEFAULT_URL;

  function detectProtocol(url) {
    if (url.includes('.m3u8')) return 'HLS (m3u8)';
    if (url.includes('.mpd')) return 'DASH (mpd)';
    if (url.includes('.ts')) return 'MPEG-TS';
    if (url.includes('rtmp://')) return 'RTMP';
    return 'HTTP Stream';
  }

  function setStatus(type, main, detail) {
    statusDot.className = 'status-dot ' + type;
    statusText.innerHTML = main + ' <span id="statusDetail">' + detail + '</span>';
    infoStatus.textContent = detail;
  }

  function showError(msg) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = '⚠ Hata: ' + msg;
    setStatus('error', 'Yayın yüklenemedi.', 'Hata');
  }

  function hideError() {
    errorMsg.style.display = 'none';
  }

  function loadStream(url) {
    url = url || currentUrl;
    currentUrl = url;
    hideError();
    setStatus('loading', 'Yayın yükleniyor...', 'Bağlanıyor');

    infoProtocol.textContent = detectProtocol(url);

    if (hlsInstance) {
      hlsInstance.destroy();
      hlsInstance = null;
    }

    const isHLS = url.includes('.m3u8');

    if (isHLS && typeof Hls !== 'undefined' && Hls.isSupported()) {
      hlsInstance = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
      });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play().catch(() => {});
      });
      hlsInstance.on(Hls.Events.ERROR, function (event, data) {
        if (data.fatal) {
          showError('HLS yayını yüklenemedi: ' + (data.details || 'Bilinmeyen hata'));
        }
      });
    } else if (isHLS && video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play().catch(() => {});
    } else {
      video.src = url;
      video.play().catch(() => {});
    }
  }

  function loadCustomStream() {
    const input = document.getElementById('streamUrlInput');
    const url = input.value.trim();
    if (!url) { showError('Lütfen bir URL girin.'); return; }
    loadStream(url);
  }

  function reloadStream() {
    loadStream(currentUrl);
  }

  function toggleMute() {
    video.muted = !video.muted;
    document.getElementById('muteLabel').textContent = video.muted ? 'Sesi Aç' : 'Sesi Kapat';
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      video.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }

  video.addEventListener('loadedmetadata', function () {
    infoResolution.textContent = video.videoWidth + 'x' + video.videoHeight;
    const dur = video.duration;
    infoDuration.textContent = isFinite(dur) ? formatTime(dur) : 'Canlı';
  });

  video.addEventListener('playing', function () {
    setStatus('', 'Yayın oynatılıyor', 'Aktif');
    statusDot.className = 'status-dot';
    statusDot.style.background = '#22c55e';
    statusDot.style.boxShadow = '0 0 8px #22c55e';
  });

  video.addEventListener('waiting', function () {
    setStatus('loading', 'Yükleniyor...', 'Tamponlanıyor');
  });

  video.addEventListener('error', function () {
    const err = video.error;
    let msg = 'Video oynatılamadı.';
    if (err) {
      switch (err.code) {
        case 1: msg = 'Video yükleme iptal edildi.'; break;
        case 2: msg = 'Ağ hatası: Sunucuya bağlanılamadı.'; break;
        case 3: msg = 'Codec veya format desteklenmiyor.'; break;
        case 4: msg = 'Video kaynağı bulunamadı veya desteklenmiyor.'; break;
      }
    }
    showError(msg);
  });

  function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
  }

  function loadHlsScript(callback) {
    if (typeof Hls !== 'undefined') { callback(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js';
    s.onload = callback;
    s.onerror = callback;
    document.head.appendChild(s);
  }

  loadHlsScript(function () {
    loadStream(DEFAULT_URL);
  });
</script>

</body>
</html>
